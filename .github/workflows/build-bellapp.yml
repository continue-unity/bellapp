      - name: Decode and verify BellApp project
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode /tmp/bellapp.b64 > /tmp/bellapp.tar.gz
          echo "383c0e7572eed6fc51e3503d75bca22c695935e0f197043a629ab66f9486aa88  /tmp/bellapp.tar.gz" | sha256sum -c -
          tar -xzf /tmp/bellapp.tar.gz

      - name: Insert repository URL and exact workflow code
        shell: bash
        env:
          REPOSITORY_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail
          sed -i "s|__REPOSITORY_URL__|$REPOSITORY_URL|g"             app/src/main/java/com/iljagrim/bellapp/MainActivity.java
          test -f .github/workflows/build-bellapp.yml
          cp .github/workflows/build-bellapp.yml             app/src/main/res/raw/app_code.txt

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=$ANDROID_HOME"
          test -d "$ANDROID_HOME/platforms/android-35"
          test -d "$ANDROID_HOME/build-tools/35.0.0"
          java -version

      - name: Download verified Gradle 8.10.2
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL --retry 3             https://services.gradle.org/distributions/gradle-8.10.2-bin.zip             -o /tmp/gradle-8.10.2-bin.zip
          curl -fsSL --retry 3             https://services.gradle.org/distributions/gradle-8.10.2-bin.zip.sha256             -o /tmp/gradle-8.10.2-bin.zip.sha256
          echo "$(cat /tmp/gradle-8.10.2-bin.zip.sha256)  /tmp/gradle-8.10.2-bin.zip" | sha256sum -c -
          rm -rf /tmp/gradle-8.10.2
          unzip -q /tmp/gradle-8.10.2-bin.zip -d /tmp
          /tmp/gradle-8.10.2/bin/gradle --version

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          /tmp/gradle-8.10.2/bin/gradle             --no-daemon             :app:assembleDebug             --stacktrace

      - name: Verify APK exists
        shell: bash
        run: |
          set -euo pipefail
          test -f app/build/outputs/apk/debug/app-debug.apk
          cp app/build/outputs/apk/debug/app-debug.apk             BellApp-V6.4-debug.apk
          ls -lh BellApp-V6.4-debug.apk

      - name: Upload APK to this Actions run
        uses: actions/upload-artifact@v6
        with:
          name: BellApp-V6.4-APK
          path: |
            BellApp-V6.4-debug.apk
            play-store/privacy-policy-template.html
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Publish direct APK
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release delete bellapp-v6.4-layout-timing-test             --cleanup-tag             --yes 2>/dev/null || true
          gh release create bellapp-v6.4-layout-timing-test             BellApp-V6.4-debug.apk             play-store/privacy-policy-template.html             --target "$GITHUB_SHA"             --title "BellApp V6.4 layout and timing test"             --notes "Compact one-page layout, in-app workflow code, and sequential rings with 0.5 seconds of silence."             --prerelease
