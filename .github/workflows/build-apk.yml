          package com.iljagrim.bellapp;
          
          import android.content.Context;
          import android.content.SharedPreferences;
          
          public final class AppPrefs {
              public static final String SOUND_BELL = "bell";
              public static final String SOUND_CUCKOO = "cuckoo";
          
              private static final String PREFS_NAME = "bellapp_prefs";
              private static final String KEY_ENABLED = "enabled";
              private static final String KEY_ADD_30 = "add_30";
              private static final String KEY_ADD_15 = "add_15";
              private static final String KEY_SOUND = "sound";
              private static final String KEY_MODE_24H = "mode_24h";
          
              private AppPrefs() {}
          
              private static SharedPreferences prefs(Context context) {
                  return context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
              }
          
              public static boolean isEnabled(Context context) {
                  return prefs(context).getBoolean(KEY_ENABLED, false);
              }
          
              public static void setEnabled(Context context, boolean enabled) {
                  prefs(context).edit().putBoolean(KEY_ENABLED, enabled).apply();
              }
          
              public static boolean add30(Context context) {
                  return prefs(context).getBoolean(KEY_ADD_30, false) || add15(context);
              }
          
              public static void setAdd30(Context context, boolean enabled) {
                  SharedPreferences.Editor e = prefs(context).edit();
                  e.putBoolean(KEY_ADD_30, enabled);
                  if (!enabled) e.putBoolean(KEY_ADD_15, false);
                  e.apply();
              }
          
              public static boolean add15(Context context) {
                  return prefs(context).getBoolean(KEY_ADD_15, false);
              }
          
              public static void setAdd15(Context context, boolean enabled) {
                  SharedPreferences.Editor e = prefs(context).edit();
                  e.putBoolean(KEY_ADD_15, enabled);
                  if (enabled) e.putBoolean(KEY_ADD_30, true);
                  e.apply();
              }
          
              public static String getSound(Context context) {
                  return prefs(context).getString(KEY_SOUND, SOUND_BELL);
              }
          
              public static void setSound(Context context, String sound) {
                  prefs(context).edit().putString(KEY_SOUND, sound).apply();
              }
          
              public static boolean is24h(Context context) {
                  return prefs(context).getBoolean(KEY_MODE_24H, false);
              }
          
              public static void set24h(Context context, boolean enabled) {
                  prefs(context).edit().putBoolean(KEY_MODE_24H, enabled).apply();
              }
          
              public static String chimeModeText(Context context) {
                  if (add15(context)) return "15 min";
                  if (add30(context)) return "30 min";
                  return "hour";
              }
          
              public static String runModeText(Context context) {
                  return is24h(context) ? "24h" : "Night mode";
              }
          }
