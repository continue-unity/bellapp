          cat > app/src/main/java/com/iljagrim/bellapp/ActionReceiver.java <<'EOF'
          package com.iljagrim.bellapp;
          
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          
          public class ActionReceiver extends BroadcastReceiver {
              public static final String ACTION_START = "com.iljagrim.bellapp.START";
              public static final String ACTION_STOP = "com.iljagrim.bellapp.STOP";
              public static final String ACTION_TEST = "com.iljagrim.bellapp.TEST";
          
              @Override
              public void onReceive(Context context, Intent intent) {
                  String action = intent.getAction();
                  if (ACTION_START.equals(action)) {
                      AppPrefs.setEnabled(context, true);
                      AlarmScheduler.scheduleNext(context);
                  } else if (ACTION_STOP.equals(action)) {
                      AppPrefs.setEnabled(context, false);
                      AlarmScheduler.cancel(context);
                  } else if (ACTION_TEST.equals(action)) {
                      ChimePlayer.playTest(context);
                      ConsoleNotification.show(context);
                  }
              }
          }
