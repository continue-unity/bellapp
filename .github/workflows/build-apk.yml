          package com.iljagrim.bellapp;

          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;

          import java.util.Calendar;

          public final class AlarmScheduler {
              private static final int REQUEST_CODE = 1001;

              private AlarmScheduler() {}

              public static void scheduleNextAlarm(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager == null) return;

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S && !alarmManager.canScheduleExactAlarms()) {
                      ConsoleNotification.show(context);
                      return;
                  }

                  long triggerAtMillis = getNextAlignedTimeMillis(context);
                  PendingIntent pendingIntent = createPendingIntent(context);

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      alarmManager.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, triggerAtMillis, pendingIntent);
                  } else {
                      alarmManager.setExact(AlarmManager.RTC_WAKEUP, triggerAtMillis, pendingIntent);
                  }

                  ConsoleNotification.show(context);
              }

              public static void cancelAlarm(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager != null) alarmManager.cancel(createPendingIntent(context));
                  ConsoleNotification.show(context);
              }

              public static long getNextAlignedTimeMillis(Context context) {
                  int interval = AppPrefs.getIntervalMinutes(context);
                  Calendar calendar = Calendar.getInstance();
                  int minute = calendar.get(Calendar.MINUTE);
                  int nextMinute = ((minute / interval) + 1) * interval;

                  if (nextMinute >= 60) {
                      calendar.add(Calendar.HOUR_OF_DAY, 1);
                      nextMinute = 0;
                  }

                  calendar.set(Calendar.MINUTE, nextMinute);
                  calendar.set(Calendar.SECOND, 0);
                  calendar.set(Calendar.MILLISECOND, 0);
                  return calendar.getTimeInMillis();
              }

              private static PendingIntent createPendingIntent(Context context) {
                  Intent intent = new Intent(context, AlarmReceiver.class);
                  intent.setAction(AlarmReceiver.ACTION_ALARM);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) flags |= PendingIntent.FLAG_IMMUTABLE;
                  return PendingIntent.getBroadcast(context, REQUEST_CODE, intent, flags);
              }
          }
          EOF

          cat > app/src/main/java/com/iljagrim/bellapp/SoundPlayer.java <<'EOF'
          package com.iljagrim.bellapp;

          import android.content.Context;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.os.Handler;
          import android.os.Looper;

          import java.util.ArrayList;
          import java.util.List;

          public final class SoundPlayer {
              private static final List<MediaPlayer> ACTIVE_PLAYERS = new ArrayList<>();

              private SoundPlayer() {}

              public static void playConfigured(Context context) {
                  play(context.getApplicationContext(), AppPrefs.getSound(context), AppPrefs.getSignalCount(context));
              }

              public static void playTest(Context context) {
                  play(context.getApplicationContext(), AppPrefs.getSound(context), 1);
              }

              private static void play(Context context, String sound, int count) {
                  int resId = AppPrefs.SOUND_CUCKOO.equals(sound) ? R.raw.cuckoo : R.raw.bell;
                  playOne(context, resId, Math.max(1, count));
              }

              private static void playOne(Context context, int resId, int remaining) {
                  MediaPlayer player = MediaPlayer.create(context, resId);
                  if (player == null) return;

                  player.setAudioAttributes(new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_ALARM)
                          .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                          .build());
                  player.setVolume(1.0f, 1.0f);

                  synchronized (ACTIVE_PLAYERS) {
                      ACTIVE_PLAYERS.add(player);
                  }

                  player.setOnCompletionListener(mp -> {
                      synchronized (ACTIVE_PLAYERS) {
                          ACTIVE_PLAYERS.remove(mp);
                      }
                      mp.release();
                      if (remaining > 1) {
                          new Handler(Looper.getMainLooper()).postDelayed(
                                  () -> playOne(context, resId, remaining - 1),
                                  650
                          );
                      }
                  });

                  player.start();
              }
          }
