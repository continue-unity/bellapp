          package com.iljagrim.bellapp;

          import android.Manifest;
          import android.app.AlarmManager;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;

          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public final class ConsoleNotification {
              private static final String CHANNEL_ID = "bellapp_console_v2";
              private static final int NOTIFICATION_ID = 3001;

              private ConsoleNotification() {}

              public static void show(Context context) {
                  if (Build.VERSION.SDK_INT >= 33 &&
                          context.checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      return;
                  }

                  createChannel(context);
                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager == null) return;

                  boolean enabled = AppPrefs.isEnabled(context);
                  int interval = AppPrefs.getIntervalMinutes(context);
                  int count = AppPrefs.getSignalCount(context);
                  String status = enabled ? "Active" : "Paused";
                  String next = enabled ? new SimpleDateFormat("HH:mm", Locale.getDefault())
                          .format(new Date(AlarmScheduler.getNextAlignedTimeMillis(context))) : "not scheduled";

                  String restriction = getRestrictionText(context);
                  String title = "BellApp " + status + " — every " + interval + " min";
                  String text = restriction.length() > 0
                          ? restriction
                          : "Next: " + next + " • signals: " + count;

                  Notification.Builder builder = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                          ? new Notification.Builder(context, CHANNEL_ID)
                          : new Notification.Builder(context);

                  builder.setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                          .setContentTitle(title)
                          .setContentText(text)
                          .setStyle(new Notification.BigTextStyle().bigText(text))
                          .setOngoing(enabled)
                          .setShowWhen(false)
                          .setContentIntent(openOrFixIntent(context))
                          .addAction(android.R.drawable.ic_media_play, "Test", actionIntent(context, AlarmReceiver.ACTION_TEST, 4101))
                          .addAction(android.R.drawable.ic_menu_manage, enabled ? "Stop" : "Start", actionIntent(context, AlarmReceiver.ACTION_TOGGLE, 4102));

                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) {
                      builder.setPriority(Notification.PRIORITY_LOW);
                  }

                  manager.notify(NOTIFICATION_ID, builder.build());
              }

              public static void cancel(Context context) {
                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager != null) manager.cancel(NOTIFICATION_ID);
              }

              public static String getRestrictionText(Context context) {
                  if (Build.VERSION.SDK_INT >= 33 &&
                          context.checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      return "Notifications restricted — open BellApp to allow.";
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                      if (alarmManager != null && !alarmManager.canScheduleExactAlarms()) {
                          return "Exact alarms restricted — tap to fix.";
                      }
                  }

                  return "";
              }

              private static PendingIntent openOrFixIntent(Context context) {
                  Intent intent = new Intent(context, MainActivity.class);
                  intent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) flags |= PendingIntent.FLAG_IMMUTABLE;
                  return PendingIntent.getActivity(context, 5001, intent, flags);
              }

              private static PendingIntent actionIntent(Context context, String action, int requestCode) {
                  Intent intent = new Intent(context, AlarmReceiver.class);
                  intent.setAction(action);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) flags |= PendingIntent.FLAG_IMMUTABLE;
                  return PendingIntent.getBroadcast(context, requestCode, intent, flags);
              }

              private static void createChannel(Context context) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;
                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager == null) return;
                  NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "BellApp console",
                          NotificationManager.IMPORTANCE_LOW
                  );
                  channel.setDescription("Silent BellApp controls and status");
                  channel.setSound(null, null);
                  channel.enableVibration(false);
                  manager.createNotificationChannel(channel);
              }
          }
          EOF

          cat > app/src/main/java/com/iljagrim/bellapp/AlarmReceiver.java <<'EOF'
          package com.iljagrim.bellapp;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;

          public class AlarmReceiver extends BroadcastReceiver {
              public static final String ACTION_ALARM = "com.iljagrim.bellapp.ACTION_ALARM";
              public static final String ACTION_TEST = "com.iljagrim.bellapp.ACTION_TEST";
              public static final String ACTION_TOGGLE = "com.iljagrim.bellapp.ACTION_TOGGLE";

              @Override
              public void onReceive(Context context, Intent intent) {
                  String action = intent != null ? intent.getAction() : ACTION_ALARM;

                  if (ACTION_TEST.equals(action)) {
                      SoundPlayer.playTest(context);
                      ConsoleNotification.show(context);
                      return;
                  }

                  if (ACTION_TOGGLE.equals(action)) {
                      boolean enabled = !AppPrefs.isEnabled(context);
                      AppPrefs.setEnabled(context, enabled);
                      if (enabled) AlarmScheduler.scheduleNextAlarm(context);
                      else AlarmScheduler.cancelAlarm(context);
                      ConsoleNotification.show(context);
                      return;
                  }

                  SoundPlayer.playConfigured(context);
                  if (AppPrefs.isEnabled(context)) AlarmScheduler.scheduleNextAlarm(context);
                  ConsoleNotification.show(context);
              }
          }
