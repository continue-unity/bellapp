          package com.iljagrim.bellapp;

          import android.content.Context;
          import android.content.SharedPreferences;

          public final class AppPrefs {
              public static final String SOUND_BELL = "bell";
              public static final String SOUND_CUCKOO = "cuckoo";

              private static final String PREFS_NAME = "bellapp_prefs";
              private static final String KEY_ENABLED = "enabled";
              private static final String KEY_SOUND = "sound";
              private static final String KEY_INTERVAL = "interval_minutes";

              private AppPrefs() {}

              public static void setEnabled(Context context, boolean enabled) {
                  context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .edit().putBoolean(KEY_ENABLED, enabled).apply();
              }

              public static boolean isEnabled(Context context) {
                  return context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .getBoolean(KEY_ENABLED, false);
              }

              public static void setSound(Context context, String sound) {
                  context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .edit().putString(KEY_SOUND, sound).apply();
              }

              public static String getSound(Context context) {
                  return context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .getString(KEY_SOUND, SOUND_BELL);
              }

              public static void setIntervalMinutes(Context context, int minutes) {
                  context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .edit().putInt(KEY_INTERVAL, minutes).apply();
              }

              public static int getIntervalMinutes(Context context) {
                  return context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE)
                          .getInt(KEY_INTERVAL, 60);
              }

              public static int getSignalCount(Context context) {
                  int minutes = getIntervalMinutes(context);
                  if (minutes == 15) return 1;
                  if (minutes == 30) return 2;
                  return 3;
              }
          }
