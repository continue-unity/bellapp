          cat > app/src/main/java/com/iljagrim/bellapp/MainActivity.java <<'EOF'
          package com.iljagrim.bellapp;

          import android.Manifest;
          import android.app.Activity;
          import android.app.AlarmManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Typeface;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.Gravity;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.RadioButton;
          import android.widget.RadioGroup;
          import android.widget.TextView;

          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private TextView statusText;
              private TextView nextRingText;
              private TextView restrictionText;
              private RadioGroup soundGroup;
              private RadioGroup intervalGroup;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  createLayout();
                  requestNotificationPermissionIfNeeded();
                  updateStatus();
              }

              private void createLayout() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(48, 52, 48, 36);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);

                  TextView title = new TextView(this);
                  title.setText("BellApp V2");
                  title.setTextSize(30);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("15 min = 1 signal • 30 min = 2 • hour = 3");
                  subtitle.setTextSize(15);
                  subtitle.setGravity(Gravity.CENTER);
                  subtitle.setPadding(0, 10, 0, 20);

                  statusText = new TextView(this);
                  statusText.setTextSize(19);
                  statusText.setGravity(Gravity.CENTER);

                  nextRingText = new TextView(this);
                  nextRingText.setTextSize(16);
                  nextRingText.setGravity(Gravity.CENTER);
                  nextRingText.setPadding(0, 0, 0, 18);

                  restrictionText = new TextView(this);
                  restrictionText.setTextSize(15);
                  restrictionText.setGravity(Gravity.CENTER);
                  restrictionText.setPadding(0, 0, 0, 18);

                  intervalGroup = new RadioGroup(this);
                  intervalGroup.setOrientation(RadioGroup.VERTICAL);
                  intervalGroup.addView(makeRadio("Every 15 minutes — 1 signal", 15));
                  intervalGroup.addView(makeRadio("Every 30 minutes — 2 signals", 30));
                  intervalGroup.addView(makeRadio("Every hour — 3 signals", 60));
                  intervalGroup.setOnCheckedChangeListener((group, checkedId) -> {
                      AppPrefs.setIntervalMinutes(this, checkedId);
                      if (AppPrefs.isEnabled(this)) AlarmScheduler.scheduleNextAlarm(this);
                      updateStatus();
                  });

                  TextView soundLabel = new TextView(this);
                  soundLabel.setText("Sound type");
                  soundLabel.setTextSize(18);
                  soundLabel.setTypeface(Typeface.DEFAULT_BOLD);
                  soundLabel.setPadding(0, 20, 0, 8);

                  soundGroup = new RadioGroup(this);
                  soundGroup.setOrientation(RadioGroup.HORIZONTAL);
                  RadioButton bell = new RadioButton(this);
                  bell.setText("Bell");
                  bell.setId(1);
                  RadioButton cuckoo = new RadioButton(this);
                  cuckoo.setText("Cuckoo");
                  cuckoo.setId(2);
                  soundGroup.addView(bell);
                  soundGroup.addView(cuckoo);
                  soundGroup.setOnCheckedChangeListener((group, checkedId) -> {
                      AppPrefs.setSound(this, checkedId == 2 ? AppPrefs.SOUND_CUCKOO : AppPrefs.SOUND_BELL);
                      ConsoleNotification.show(this);
                      updateStatus();
                  });

                  Button startButton = new Button(this);
                  startButton.setText("Start");
                  startButton.setOnClickListener(v -> startBell());

                  Button stopButton = new Button(this);
                  stopButton.setText("Stop");
                  stopButton.setOnClickListener(v -> stopBell());

                  Button testButton = new Button(this);
                  testButton.setText("Test selected sound");
                  testButton.setOnClickListener(v -> {
                      SoundPlayer.playTest(this);
                      ConsoleNotification.show(this);
                  });

                  Button permissionButton = new Button(this);
                  permissionButton.setText("Open exact alarm permission");
                  permissionButton.setOnClickListener(v -> openExactAlarmPermissionSettings());

                  root.addView(title, matchWidth());
                  root.addView(subtitle, matchWidth());
                  root.addView(statusText, matchWidth());
                  root.addView(nextRingText, matchWidth());
                  root.addView(restrictionText, matchWidth());
                  root.addView(intervalGroup, matchWidth());
                  root.addView(soundLabel, matchWidth());
                  root.addView(soundGroup, matchWidth());
                  root.addView(testButton, matchWidth());
                  root.addView(startButton, matchWidth());
                  root.addView(stopButton, matchWidth());
                  root.addView(permissionButton, matchWidth());
                  setContentView(root);
              }

              private RadioButton makeRadio(String text, int id) {
                  RadioButton rb = new RadioButton(this);
                  rb.setText(text);
                  rb.setTextSize(16);
                  rb.setId(id);
                  return rb;
              }

              private LinearLayout.LayoutParams matchWidth() {
                  LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  params.setMargins(0, 8, 0, 8);
                  return params;
              }

              private void startBell() {
                  if (!canScheduleExactAlarms()) {
                      openExactAlarmPermissionSettings();
                      return;
                  }
                  AppPrefs.setEnabled(this, true);
                  AlarmScheduler.scheduleNextAlarm(this);
                  ConsoleNotification.show(this);
                  updateStatus();
              }

              private void stopBell() {
                  AppPrefs.setEnabled(this, false);
                  AlarmScheduler.cancelAlarm(this);
                  ConsoleNotification.show(this);
                  updateStatus();
              }

              private void updateStatus() {
                  boolean enabled = AppPrefs.isEnabled(this);
                  int interval = AppPrefs.getIntervalMinutes(this);
                  int count = AppPrefs.getSignalCount(this);
                  statusText.setText(enabled ? "Status: ON" : "Status: OFF");

                  if (enabled) {
                      String nextTime = new SimpleDateFormat("HH:mm", Locale.getDefault())
                              .format(new Date(AlarmScheduler.getNextAlignedTimeMillis(this)));
                      nextRingText.setText("Every " + interval + " min • " + count + " signal(s) • Next: " + nextTime);
                  } else {
                      nextRingText.setText("Every " + interval + " min • " + count + " signal(s) • Not scheduled");
                  }

                  String restriction = ConsoleNotification.getRestrictionText(this);
                  restrictionText.setText(restriction.length() > 0 ? restriction : "System: ready");

                  intervalGroup.check(interval);
                  soundGroup.check(AppPrefs.SOUND_CUCKOO.equals(AppPrefs.getSound(this)) ? 2 : 1);
              }

              private void requestNotificationPermissionIfNeeded() {
                  if (Build.VERSION.SDK_INT >= 33 &&
                          checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 3001);
                  }
              }

              private boolean canScheduleExactAlarms() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.S) return true;
                  AlarmManager alarmManager = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                  return alarmManager != null && alarmManager.canScheduleExactAlarms();
              }

              private void openExactAlarmPermissionSettings() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      Intent intent = new Intent(Settings.ACTION_REQUEST_SCHEDULE_EXACT_ALARM,
                              Uri.parse("package:" + getPackageName()));
                      startActivity(intent);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  ConsoleNotification.show(this);
                  updateStatus();
              }
          }
          EOF

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bellapp-v2-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
