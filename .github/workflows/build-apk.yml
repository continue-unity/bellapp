# COPY ALL OF THIS INTO: .github/workflows/build-bellapp.yml
name: Build BellApp V6.2 direct APK
on:
  workflow_dispatch:
  push:
    branches: [main, master]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Reconstruct BellApp
        shell: bash
        run: |
          set -euo pipefail
          echo '[... ELLIPSIZATION ...]13qUpe61KUudalLXepSl7rUpS51qUtd6lKXutSlrq97/T8bCpaDAEABAA==' | base64 -d > /tmp/src.tgz
          tar -xzf /tmp/src.tgz
          mkdir -p app/src/main/res/drawable-nodpi
          echo '' | base64 -d > app/src/main/res/drawable-nodpi/ic_launcher.png
          sed -i "s|__REPOSITORY_URL__|https://github.com/${{ github.repository }}|g" app/src/main/java/com/iljagrim/bellapp/MainActivity.java
      - name: Generate sounds
        shell: bash
        run: |
          python3 - <<'PY'
          import math,wave,struct
          from pathlib import Path
          S=44100; O=Path("app/src/main/res/raw"); O.mkdir(parents=True,exist_ok=True)
          def save(p,a):
           m=max(max(map(abs,a)),1e-9); k=.92/m
           with wave.open(str(p),"wb") as w:
            w.setparams((1,2,S,0,"NONE","not compressed")); w.writeframes(b"".join(struct.pack("<h",int(max(-1,min(1,x*k))*32767)) for x in a))
          def bell():
           a=[]
           for n in range(int(S*3.15)):
            t=n/S; e=min(1,t/.008); x=sum(A*math.sin(2*math.pi*f*t)*math.exp(-d*t) for f,A,d in [(440,1,1.55),(660,.68,1.9),(880,.42,2.35),(1320,.22,2.8),(1760,.12,3.2)])
            a.append(e*(x+.08*math.sin(2*math.pi*95*t)*math.exp(-5.5*t)))
           return a
          def cuckoo():
           a=[]
           for n in range(int(S*.78)):
            t=n/S; x=0
            for st,L,f in [(0,.27,659.25),(.33,.31,523.25)]:
             u=t-st
             if 0<=u<L:
              e=min(1,u/.012)*min(1,(L-u)/.045)*math.exp(-1.6*u); x+=e*(math.sin(2*math.pi*f*u)+.25*math.sin(4*math.pi*f*u))
            a.append(x)
           return a
          save(O/"bell.wav",bell()); save(O/"cuckoo.wav",cuckoo())
          PY
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10.2'
          cache-provider: basic
      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace
      - name: Publish direct APK
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app-debug.apk
          gh release delete bellapp-v6.2-evaluation --cleanup-tag --yes 2>/dev/null || true
          gh release create bellapp-v6.2-evaluation app-debug.apk --target "$GITHUB_SHA" --title "BellApp V6.2 evaluation" --notes "Download app-debug.apk directly and install it." --prerelease
