          package com.iljagrim.bellapp;
          
          import android.Manifest;
          import android.app.Activity;
          import android.app.AlarmManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.Gravity;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          
          public class MainActivity extends Activity {
              private static final int BLUE = Color.rgb(103, 188, 224);
              private static final int YELLOW = Color.rgb(255, 215, 64);
              private static final int WHITE = Color.WHITE;
          
              private TextView stateValue, runValue, chimeValue, soundValue;
              private Button add30Button, add15Button, bellButton, cuckooButton, mode24Button, nightButton, startButton, stopButton;
          
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestNotificationPermissionIfNeeded();
                  buildUi();
                  refresh();
                  ConsoleNotification.show(this);
              }
          
              private void buildUi() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(22, 18, 22, 12);
                  root.setBackgroundColor(BLUE);
          
                  TextView title = tv("BellApp", 26, true); title.setGravity(Gravity.CENTER); root.addView(title, full(0,0,0,0));
                  TextView subtitle = tv("Time tracking", 15, true); subtitle.setGravity(Gravity.CENTER); root.addView(subtitle, full(0,0,0,0));
                  TextView line = tv("Rings every hour", 17, true); line.setGravity(Gravity.CENTER); root.addView(line, full(0,4,0,8));
          
                  TextView status = tv("Status", 18, true); root.addView(status, full());
                  stateValue = statusLine(root, "State");
                  runValue = statusLine(root, "Run mode");
                  chimeValue = statusLine(root, "Chime mode");
                  soundValue = statusLine(root, "Sound");
          
                  root.addView(tv("Rings 4 times at :00 min", 15, true), full(0,8,0,4));
                  add30Button = choice("○ Adds 2 rings at :30 min");
                  add30Button.setOnClickListener(v -> { AppPrefs.setAdd30(this, !AppPrefs.add30(this)); if (AppPrefs.isEnabled(this)) AlarmScheduler.scheduleNext(this); refresh(); });
                  root.addView(add30Button, full());
          
                  add15Button = choice("○ Adds 1 ring at :15 min\nAdds 3 rings at :45 min");
                  add15Button.setOnClickListener(v -> { AppPrefs.setAdd15(this, !AppPrefs.add15(this)); if (AppPrefs.isEnabled(this)) AlarmScheduler.scheduleNext(this); refresh(); });
                  root.addView(add15Button, full());
          
                  LinearLayout soundRow = row();
                  soundRow.addView(label("Sound"), weight(0.85f));
                  bellButton = choice("○ Bell"); cuckooButton = choice("○ Cuckoo");
                  bellButton.setOnClickListener(v -> { AppPrefs.setSound(this, AppPrefs.SOUND_BELL); refresh(); });
                  cuckooButton.setOnClickListener(v -> { AppPrefs.setSound(this, AppPrefs.SOUND_CUCKOO); refresh(); });
                  soundRow.addView(bellButton, weight(1)); soundRow.addView(cuckooButton, weight(1));
                  root.addView(soundRow, full());
          
                  LinearLayout modeRow = row();
                  modeRow.addView(label("Run mode"), weight(0.85f));
                  mode24Button = choice("○ 24h"); nightButton = choice("○ Night mode");
                  mode24Button.setOnClickListener(v -> { AppPrefs.set24h(this, true); if (AppPrefs.isEnabled(this)) AlarmScheduler.scheduleNext(this); refresh(); });
                  nightButton.setOnClickListener(v -> { AppPrefs.set24h(this, false); if (AppPrefs.isEnabled(this)) AlarmScheduler.scheduleNext(this); refresh(); });
                  modeRow.addView(mode24Button, weight(1)); modeRow.addView(nightButton, weight(1));
                  root.addView(modeRow, full());
                  TextView nightInfo = tv("Night mode rings at 07:00–22:00", 12, false); nightInfo.setGravity(Gravity.CENTER); root.addView(nightInfo, full(0,0,0,4));
          
                  LinearLayout controlRow = row();
                  startButton = action("START"); stopButton = action("STOP"); Button testButton = action("TEST");
                  startButton.setOnClickListener(v -> { if (!canScheduleExactAlarms()) { openExactAlarmPermissionSettings(); return; } AppPrefs.setEnabled(this, true); AlarmScheduler.scheduleNext(this); refresh(); });
                  stopButton.setOnClickListener(v -> { AppPrefs.setEnabled(this, false); AlarmScheduler.cancel(this); refresh(); });
                  testButton.setOnClickListener(v -> ChimePlayer.playTest(this));
                  controlRow.addView(startButton, weight(1)); controlRow.addView(stopButton, weight(1)); controlRow.addView(testButton, weight(1));
                  root.addView(controlRow, full());
          
                  Button perm = action("Open Android settings"); perm.setOnClickListener(v -> openExactAlarmPermissionSettings()); root.addView(perm, full());
          
                  LinearLayout footer = row();
                  Button privacy = small("Privacy"); privacy.setOnClickListener(v -> startActivity(new Intent(this, PrivacyActivity.class)));
                  Button github = small("GitHub"); github.setOnClickListener(v -> openUrl("https://github.com/"));
                  Button code = small("Read code"); code.setOnClickListener(v -> openUrl("https://github.com/"));
                  footer.addView(privacy, weight(1)); footer.addView(github, weight(1)); footer.addView(code, weight(1));
                  root.addView(footer, full(0,4,0,0));
                  TextView version = tv("Version 5.0", 11, false); version.setGravity(Gravity.CENTER); root.addView(version, full(0,0,0,0));
          
                  setContentView(root);
              }
          
              private TextView statusLine(LinearLayout root, String label) {
                  LinearLayout r = row();
                  TextView l = tv(label, 14, true);
                  TextView v = tv("", 14, false);
                  r.addView(l, weight(1)); r.addView(v, weight(1)); root.addView(r, full(0,0,0,0));
                  return v;
              }
          
              private void refresh() {
                  stateValue.setText(AppPrefs.isEnabled(this) ? "ACTIVE" : "OFF");
                  runValue.setText(AppPrefs.runModeText(this));
                  chimeValue.setText(AppPrefs.chimeModeText(this));
                  soundValue.setText(AppPrefs.SOUND_CUCKOO.equals(AppPrefs.getSound(this)) ? "Cuckoo" : "Bell");
          
                  setSelected(add30Button, AppPrefs.add30(this), "Adds 2 rings at :30 min");
                  setSelected(add15Button, AppPrefs.add15(this), "Adds 1 ring at :15 min\nAdds 3 rings at :45 min");
                  setSelected(bellButton, AppPrefs.SOUND_BELL.equals(AppPrefs.getSound(this)), "Bell");
                  setSelected(cuckooButton, AppPrefs.SOUND_CUCKOO.equals(AppPrefs.getSound(this)), "Cuckoo");
                  setSelected(mode24Button, AppPrefs.is24h(this), "24h");
                  setSelected(nightButton, !AppPrefs.is24h(this), "Night mode");
                  setActionSelected(startButton, AppPrefs.isEnabled(this));
                  setActionSelected(stopButton, !AppPrefs.isEnabled(this));
                  ConsoleNotification.show(this);
              }
          
              private void setSelected(Button b, boolean selected, String text) {
                  b.setText((selected ? "● " : "○ ") + text);
                  b.setBackgroundColor(selected ? YELLOW : WHITE);
                  b.setTextColor(Color.BLACK);
              }
          
              private void setActionSelected(Button b, boolean selected) {
                  b.setBackgroundColor(selected ? YELLOW : WHITE);
                  b.setTextColor(Color.BLACK);
              }
          
              private void requestNotificationPermissionIfNeeded() {
                  if (Build.VERSION.SDK_INT >= 33 && checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 3001);
                  }
              }
          
              private boolean canScheduleExactAlarms() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.S) return true;
                  AlarmManager am = (AlarmManager) getSystemService(Context.ALARM_SERVICE);
                  return am != null && am.canScheduleExactAlarms();
              }
          
              private void openExactAlarmPermissionSettings() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      try { startActivity(new Intent(Settings.ACTION_REQUEST_SCHEDULE_EXACT_ALARM, Uri.parse("package:" + getPackageName()))); return; } catch (Exception ignored) {}
                  }
                  try { startActivity(new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS, Uri.parse("package:" + getPackageName()))); } catch (Exception ignored) {}
              }
          
              private void openUrl(String url) {
                  try { startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); } catch (Exception ignored) {}
              }
          
              private TextView tv(String s, int size, boolean bold) { TextView t = new TextView(this); t.setText(s); t.setTextSize(size); t.setTextColor(Color.BLACK); if (bold) t.setTypeface(Typeface.DEFAULT_BOLD); return t; }
              private TextView label(String s) { TextView t = tv(s, 14, true); t.setGravity(Gravity.CENTER_VERTICAL); return t; }
              private Button choice(String s) { Button b = new Button(this); b.setText(s); b.setTextSize(13); b.setAllCaps(false); b.setGravity(Gravity.CENTER); b.setPadding(4,0,4,0); b.setMinHeight(dp(38)); b.setBackgroundColor(WHITE); b.setTextColor(Color.BLACK); return b; }
              private Button action(String s) { Button b = choice(s); b.setTextSize(13); return b; }
              private Button small(String s) { Button b = choice(s); b.setTextSize(11); b.setMinHeight(dp(34)); return b; }
              private LinearLayout row() { LinearLayout l = new LinearLayout(this); l.setOrientation(LinearLayout.HORIZONTAL); return l; }
              private LinearLayout.LayoutParams weight(float w) { return new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, w); }
              private LinearLayout.LayoutParams full() { return full(0,2,0,2); }
              private LinearLayout.LayoutParams full(int l, int t, int r, int b) { LinearLayout.LayoutParams p = new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT); p.setMargins(l,t,r,b); return p; }
              private int dp(int v) { return (int)(v * getResources().getDisplayMetrics().density + 0.5f); }
          }
