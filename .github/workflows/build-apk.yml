name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Create Android project files
        run: |
          mkdir -p app/src/main/java/com/iljagrim/coucoubell
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = 'BellApp'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.8.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.iljagrim.coucoubell'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.iljagrim.coucoubell'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">Coucou Bell</string>
          </resources>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:colorAccent">#444444</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />

              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name="com.iljagrim.coucoubell.MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

                  <receiver
                      android:name="com.iljagrim.coucoubell.AlarmReceiver"
                      android:exported="false" />

                  <receiver
                      android:name="com.iljagrim.coucoubell.BootReceiver"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                      </intent-filter>

                  </receiver>

              </application>

          </manifest>
          EOF

          cat > app/src/main/java/com/iljagrim/coucoubell/AppPrefs.java <<'EOF'
          package com.iljagrim.coucoubell;

          import android.content.Context;
          import android.content.SharedPreferences;

          public final class AppPrefs {
              private static final String PREFS_NAME = "coucou_bell_prefs";
              private static final String KEY_ENABLED = "enabled";

              private AppPrefs() {}

              public static void setEnabled(Context context, boolean enabled) {
                  SharedPreferences prefs = context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
                  prefs.edit().putBoolean(KEY_ENABLED, enabled).apply();
              }

              public static boolean isEnabled(Context context) {
                  SharedPreferences prefs = context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
                  return prefs.getBoolean(KEY_ENABLED, false);
              }
          }
          EOF

          cat > app/src/main/java/com/iljagrim/coucoubell/AlarmScheduler.java <<'EOF'
          package com.iljagrim.coucoubell;

          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          import java.util.Calendar;

          public final class AlarmScheduler {
              private static final int REQUEST_CODE = 1001;

              private AlarmScheduler() {}

              public static void scheduleNextHourlyAlarm(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager == null) return;

                  PendingIntent pendingIntent = createPendingIntent(context);
                  long triggerAtMillis = getNextFullHourMillis();

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      if (!alarmManager.canScheduleExactAlarms()) return;
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      alarmManager.setExactAndAllowWhileIdle(
                              AlarmManager.RTC_WAKEUP,
                              triggerAtMillis,
                              pendingIntent
                      );
                  } else {
                      alarmManager.setExact(
                              AlarmManager.RTC_WAKEUP,
                              triggerAtMillis,
                              pendingIntent
                      );
                  }
              }

              public static void cancelHourlyAlarm(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager != null) {
                      alarmManager.cancel(createPendingIntent(context));
                  }
              }

              public static long getNextFullHourMillis() {
                  Calendar calendar = Calendar.getInstance();
                  calendar.add(Calendar.HOUR_OF_DAY, 1);
                  calendar.set(Calendar.MINUTE, 0);
                  calendar.set(Calendar.SECOND, 0);
                  calendar.set(Calendar.MILLISECOND, 0);
                  return calendar.getTimeInMillis();
              }

              private static PendingIntent createPendingIntent(Context context) {
                  Intent intent = new Intent(context, AlarmReceiver.class);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT;

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      flags |= PendingIntent.FLAG_IMMUTABLE;
                  }

                  return PendingIntent.getBroadcast(context, REQUEST_CODE, intent, flags);
              }
          }
          EOF

          cat > app/src/main/java/com/iljagrim/coucoubell/AlarmReceiver.java <<'EOF'
          package com.iljagrim.coucoubell;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.media.AudioAttributes;
          import android.net.Uri;
          import android.os.Build;
          import android.provider.Settings;

          public class AlarmReceiver extends BroadcastReceiver {
              private static final String CHANNEL_ID = "hourly_bell_channel";
              private static final int NOTIFICATION_ID = 2001;

              @Override
              public void onReceive(Context context, Intent intent) {
                  ringOnce(context);

                  if (AppPrefs.isEnabled(context)) {
                      AlarmScheduler.scheduleNextHourlyAlarm(context);
                  }
              }

              public static void ringOnce(Context context) {
                  createNotificationChannel(context);

                  NotificationManager manager =
                          (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);

                  if (manager == null) return;

                  Notification.Builder builder;

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      builder = new Notification.Builder(context, CHANNEL_ID);
                  } else {
                      builder = new Notification.Builder(context);
                      builder.setSound(Settings.System.DEFAULT_NOTIFICATION_URI);
                      builder.setPriority(Notification.PRIORITY_HIGH);
                  }

                  Notification notification = builder
                          .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                          .setContentTitle("Coucou Bell")
                          .setContentText("Hourly signal")
                          .setAutoCancel(true)
                          .setCategory(Notification.CATEGORY_ALARM)
                          .build();

                  manager.notify(NOTIFICATION_ID, notification);
              }

              private static void createNotificationChannel(Context context) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;

                  NotificationManager manager =
                          (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);

                  if (manager == null) return;

                  Uri soundUri = Settings.System.DEFAULT_NOTIFICATION_URI;

                  AudioAttributes audioAttributes = new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_ALARM)
                          .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                          .build();

                  NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "Hourly bell",
                          NotificationManager.IMPORTANCE_HIGH
                  );

                  channel.setDescription("Hourly bell signal");
                  channel.setSound(soundUri, audioAttributes);
                  channel.enableVibration(false);

                  manager.createNotificationChannel(channel);
              }
          }
          EOF

          cat > app/src/main/java/com/iljagrim/coucoubell/BootReceiver.java <<'EOF'
          package com.iljagrim.coucoubell;

          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;

          public class BootReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                      if (AppPrefs.isEnabled(context)) {
                          AlarmScheduler.scheduleNextHourlyAlarm(context);
                      }
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/iljagrim/coucoubell/MainActivity.java <<'EOF'
          package com.iljagrim.coucoubell;

          import android.Manifest;
          import android.app.Activity;
          import android.app.AlarmManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Typeface;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.view.Gravity;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;

          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private TextView statusText;
              private TextView nextRingText;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  createLayout();
                  requestNotificationPermissionIfNeeded();
                  updateStatus();
              }

              private void createLayout() {
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(48, 64, 48, 48);
                  root.setGravity(Gravity.CENTER_HORIZONTAL);

                  TextView title = new TextView(this);
                  title.setText("Coucou Bell");
                  title.setTextSize(30);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER);

                  TextView subtitle = new TextView(this);
                  subtitle.setText("One signal every full hour");
                  subtitle.setTextSize(16);
                  subtitle.setGravity(Gravity.CENTER);
                  subtitle.setPadding(0, 12, 0, 36);

                  statusText = new TextView(this);
                  statusText.setTextSize(20);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 0, 0, 16);

                  nextRingText = new TextView(this);
                  nextRingText.setTextSize(16);
                  nextRingText.setGravity(Gravity.CENTER);
                  nextRingText.setPadding(0, 0, 0, 32);

                  Button startButton = new Button(this);
                  startButton.setText("Start hourly bell");
                  startButton.setOnClickListener(v -> startBell());

                  Button stopButton = new Button(this);
                  stopButton.setText("Stop hourly bell");
                  stopButton.setOnClickListener(v -> stopBell());

                  Button testButton = new Button(this);
                  testButton.setText("Test signal now");
                  testButton.setOnClickListener(v -> AlarmReceiver.ringOnce(this));

                  Button permissionButton = new Button(this);
                  permissionButton.setText("Open exact alarm permission");
                  permissionButton.setOnClickListener(v -> openExactAlarmPermissionSettings());

                  root.addView(title, matchWidth());
                  root.addView(subtitle, matchWidth());
                  root.addView(statusText, matchWidth());
                  root.addView(nextRingText, matchWidth());
                  root.addView(startButton, matchWidth());
                  root.addView(stopButton, matchWidth());
                  root.addView(testButton, matchWidth());
                  root.addView(permissionButton, matchWidth());

                  setContentView(root);
              }

              private LinearLayout.LayoutParams matchWidth() {
                  LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.WRAP_CONTENT
                  );
                  params.setMargins(0, 10, 0, 10);
                  return params;
              }

              private void startBell() {
                  if (!canScheduleExactAlarms()) {
                      openExactAlarmPermissionSettings();
                      return;
                  }

                  AppPrefs.setEnabled(this, true);
                  AlarmScheduler.scheduleNextHourlyAlarm(this);
                  updateStatus();
              }

              private void stopBell() {
                  AppPrefs.setEnabled(this, false);
                  AlarmScheduler.cancelHourlyAlarm(this);
                  updateStatus();
              }

              private void updateStatus() {
                  boolean enabled = AppPrefs.isEnabled(this);

                  if (enabled) {
                      statusText.setText("Status: ON");
                      SimpleDateFormat format = new SimpleDateFormat("HH:mm", Locale.getDefault());
                      String nextTime = format.format(new Date(AlarmScheduler.getNextFullHourMillis()));
                      nextRingText.setText("Next signal: " + nextTime);
                  } else {
                      statusText.setText("Status: OFF");
                      nextRingText.setText("Next signal: not scheduled");
                  }
              }

              private void requestNotificationPermissionIfNeeded() {
                  if (Build.VERSION.SDK_INT >= 33) {
                      if (checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS)
                              != PackageManager.PERMISSION_GRANTED) {
                          requestPermissions(
                                  new String[]{Manifest.permission.POST_NOTIFICATIONS},
                                  3001
                          );
                      }
                  }
              }

              private boolean canScheduleExactAlarms() {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.S) return true;

                  AlarmManager alarmManager =
                          (AlarmManager) getSystemService(Context.ALARM_SERVICE);

                  return alarmManager != null && alarmManager.canScheduleExactAlarms();
              }

              private void openExactAlarmPermissionSettings() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {
                      Intent intent = new Intent(
                              Settings.ACTION_REQUEST_SCHEDULE_EXACT_ALARM,
                              Uri.parse("package:" + getPackageName())
                      );
                      startActivity(intent);
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  updateStatus();
              }
          }
          EOF

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK
        run: gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: coucou-bell-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
