          package com.iljagrim.bellapp;
          
          import android.Manifest;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          
          public final class ConsoleNotification {
              private static final String CHANNEL_ID = "bellapp_console_v5";
              private static final int NOTIFICATION_ID = 501;
          
              private ConsoleNotification() {}
          
              public static void show(Context context) {
                  if (Build.VERSION.SDK_INT >= 33 && context.checkSelfPermission(Manifest.permission.POST_NOTIFICATIONS) != PackageManager.PERMISSION_GRANTED) {
                      return;
                  }
                  createChannel(context);
                  NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (nm == null) return;
          
                  boolean enabled = AppPrefs.isEnabled(context);
                  String title = enabled ? "BellApp · ACTIVE" : "BellApp · OFF";
                  String text = "Mode: " + AppPrefs.chimeModeText(context) + " · " + AppPrefs.runModeText(context);
          
                  Intent open = new Intent(context, MainActivity.class);
                  PendingIntent openPi = PendingIntent.getActivity(context, 10, open, flags());
          
                  Notification.Builder b = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O
                          ? new Notification.Builder(context, CHANNEL_ID)
                          : new Notification.Builder(context);
          
                  b.setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                          .setContentTitle(title)
                          .setContentText(text)
                          .setContentIntent(openPi)
                          .setOngoing(enabled)
                          .setAutoCancel(false)
                          .setShowWhen(false)
                          .addAction(android.R.drawable.ic_media_play, "Start", actionPi(context, ActionReceiver.ACTION_START, 11))
                          .addAction(android.R.drawable.ic_media_pause, "Stop", actionPi(context, ActionReceiver.ACTION_STOP, 12))
                          .addAction(android.R.drawable.ic_btn_speak_now, "Test", actionPi(context, ActionReceiver.ACTION_TEST, 13));
          
                  nm.notify(NOTIFICATION_ID, b.build());
              }
          
              private static void createChannel(Context context) {
                  if (Build.VERSION.SDK_INT < Build.VERSION_CODES.O) return;
                  NotificationManager nm = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (nm == null) return;
                  NotificationChannel ch = new NotificationChannel(CHANNEL_ID, "BellApp console", NotificationManager.IMPORTANCE_LOW);
                  ch.setDescription("BellApp controls");
                  ch.setSound(null, null);
                  ch.enableVibration(false);
                  nm.createNotificationChannel(ch);
              }
          
              private static PendingIntent actionPi(Context context, String action, int request) {
                  Intent i = new Intent(context, ActionReceiver.class);
                  i.setAction(action);
                  return PendingIntent.getBroadcast(context, request, i, flags());
              }
          
              private static int flags() {
                  int f = PendingIntent.FLAG_UPDATE_CURRENT;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) f |= PendingIntent.FLAG_IMMUTABLE;
                  return f;
              }
          }
