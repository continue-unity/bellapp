          cat > app/src/main/java/com/iljagrim/bellapp/ChimePlayer.java <<'EOF'
          package com.iljagrim.bellapp;
          
          import android.content.Context;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.os.Handler;
          import android.os.Looper;
          
          public final class ChimePlayer {
              private static final Handler handler = new Handler(Looper.getMainLooper());
          
              private ChimePlayer() {}
          
              public static int ringsForMinute(Context context, int minute) {
                  if (minute == 0) return 4;
                  if (minute == 30 && AppPrefs.add30(context)) return 2;
                  if (minute == 15 && AppPrefs.add15(context)) return 1;
                  if (minute == 45 && AppPrefs.add15(context)) return 3;
                  return 0;
              }
          
              public static void playForMinute(Context context, int minute) {
                  playCount(context, ringsForMinute(context, minute));
              }
          
              public static void playTest(Context context) {
                  // Test uses the same playback path as scheduled chimes, but with the 15-minute example.
                  playCount(context, 1);
              }
          
              public static void playCount(Context context, int count) {
                  if (count <= 0) return;
                  for (int i = 0; i < count; i++) {
                      final int delay = i * 1100;
                      handler.postDelayed(() -> playOne(context.getApplicationContext()), delay);
                  }
              }
          
              private static void playOne(Context context) {
                  int res = AppPrefs.SOUND_CUCKOO.equals(AppPrefs.getSound(context))
                          ? R.raw.cuckoo
                          : R.raw.bell;
                  MediaPlayer player = MediaPlayer.create(context, res);
                  if (player == null) return;
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.LOLLIPOP) {
                      player.setAudioAttributes(new AudioAttributes.Builder()
                              .setUsage(AudioAttributes.USAGE_ALARM)
                              .setContentType(AudioAttributes.CONTENT_TYPE_SONIFICATION)
                              .build());
                  }
                  player.setOnCompletionListener(mp -> {
                      try { mp.release(); } catch (Exception ignored) {}
                  });
                  try {
                      player.start();
                  } catch (Exception ignored) {
                      try { player.release(); } catch (Exception ignored2) {}
                  }
              }
          }
