          package com.iljagrim.bellapp;
          
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          
          import java.util.Calendar;
          
          public final class AlarmScheduler {
              private static final int REQUEST_CODE = 1001;
          
              private AlarmScheduler() {}
          
              public static void scheduleNext(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager == null) return;
          
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S && !alarmManager.canScheduleExactAlarms()) {
                      ConsoleNotification.show(context);
                      return;
                  }
          
                  long triggerAtMillis = nextTriggerMillis(context);
                  PendingIntent pi = pendingIntent(context);
          
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      alarmManager.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, triggerAtMillis, pi);
                  } else {
                      alarmManager.setExact(AlarmManager.RTC_WAKEUP, triggerAtMillis, pi);
                  }
                  ConsoleNotification.show(context);
              }
          
              public static void cancel(Context context) {
                  AlarmManager alarmManager = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                  if (alarmManager != null) alarmManager.cancel(pendingIntent(context));
                  ConsoleNotification.show(context);
              }
          
              public static long nextTriggerMillis(Context context) {
                  Calendar c = Calendar.getInstance();
                  c.set(Calendar.SECOND, 0);
                  c.set(Calendar.MILLISECOND, 0);
          
                  for (int i = 1; i <= 96; i++) {
                      c.add(Calendar.MINUTE, 1);
                      int m = c.get(Calendar.MINUTE);
                      if (ChimePlayer.ringsForMinute(context, m) > 0 && isAllowedByRunMode(context, c)) {
                          return c.getTimeInMillis();
                      }
                  }
                  c.add(Calendar.HOUR_OF_DAY, 1);
                  c.set(Calendar.MINUTE, 0);
                  return c.getTimeInMillis();
              }
          
              public static boolean isAllowedByRunMode(Context context, Calendar c) {
                  if (AppPrefs.is24h(context)) return true;
                  int hour = c.get(Calendar.HOUR_OF_DAY);
                  return hour >= 7 && hour < 22;
              }
          
              private static PendingIntent pendingIntent(Context context) {
                  Intent intent = new Intent(context, AlarmReceiver.class);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) flags |= PendingIntent.FLAG_IMMUTABLE;
                  return PendingIntent.getBroadcast(context, REQUEST_CODE, intent, flags);
              }
          }
