          cat > app/src/main/java/com/iljagrim/bellapp/AlarmReceiver.java <<'EOF'
          package com.iljagrim.bellapp;
          
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          
          import java.util.Calendar;
          
          public class AlarmReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (!AppPrefs.isEnabled(context)) {
                      ConsoleNotification.show(context);
                      return;
                  }
                  Calendar c = Calendar.getInstance();
                  if (AlarmScheduler.isAllowedByRunMode(context, c)) {
                      ChimePlayer.playForMinute(context, c.get(Calendar.MINUTE));
                  }
                  AlarmScheduler.scheduleNext(context);
              }
          }
